<!DOCTYPE html>
<html>
<head>
    <title>Upload Resume | AI Resume ATS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f4f6f9;
        }
        .sidebar {
            height: 100vh;
            background: #111827;
            color: white;
            padding: 20px;
            position: fixed;
            width: 220px;
        }
        .sidebar h4 {
            color: #60a5fa;
        }
        .sidebar a {
            color: white;
            text-decoration: none;
            display: block;
            margin: 15px 0;
        }
        .content {
            margin-left: 240px;
            padding: 40px;
        }
        .card {
            border-radius: 12px;
        }
        .form-control, .form-select {
            border-radius: 8px;
        }
        .btn-primary {
            border-radius: 8px;
            padding: 10px 20px;
        }
    </style>
</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h4>AI Resume ATS</h4>
    <hr>
    <a href="/dashboard">Dashboard</a>
    <a href="/create_job">Create Job</a>
    <a href="/upload">Upload Resume</a>
    <a href="/">Logout</a>
</div>

<!-- MAIN CONTENT -->
<div class="content">

    <h2 class="mb-4">Upload Candidate Resume</h2>

    <div class="card shadow p-4">
        <form method="POST" enctype="multipart/form-data">

            <div class="row mb-4">
                <div class="col-md-6">
                    <label class="form-label">Candidate Name</label>
                    <input type="text" class="form-control" name="name" placeholder="Enter candidate name" required>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-control" name="email" placeholder="Enter email address" required>
                </div>
            </div>

            <div class="mb-4">
                <label class="form-label">Select Job</label>
                <select class="form-select" name="job_id" required>
                    {% for job in jobs %}
                    <option value="{{ job[0] }}">{{ job[1] }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="mb-4">
                <label class="form-label">Upload Resume (PDF)</label>
                <input type="file" class="form-control" name="resume" required>
            </div>

            <button class="btn btn-primary">Upload & Analyze</button>

        </form>
    </div>

</div>

</body>
</html>
