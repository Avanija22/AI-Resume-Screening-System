<!DOCTYPE html>
<html>
<head>
    <title>Create Job | AI Resume ATS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f4f6f9;
        }
        .sidebar {
            height: 100vh;
            background: #111827;
            color: white;
            padding: 20px;
            position: fixed;
            width: 220px;
        }
        .sidebar h4 {
            color: #60a5fa;
        }
        .sidebar a {
            color: white;
            text-decoration: none;
            display: block;
            margin: 15px 0;
        }
        .content {
            margin-left: 240px;
            padding: 40px;
        }
        .card {
            border-radius: 12px;
        }
        .form-control {
            border-radius: 8px;
        }
        .btn-success {
            border-radius: 8px;
            padding: 10px 20px;
        }
    </style>
</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h4>AI Resume ATS</h4>
    <hr>
    <a href="/dashboard">Dashboard</a>
    <a href="/create_job">Create Job</a>
    <a href="/upload">Upload Resume</a>
    <a href="/">Logout</a>
</div>

<!-- MAIN CONTENT -->
<div class="content">

    <h2 class="mb-4">Create New Job</h2>

    <div class="card shadow p-4">
        <form method="POST">

            <div class="mb-4">
                <label class="form-label">Job Title</label>
                <input type="text" class="form-control" name="title" placeholder="e.g. Python Backend Developer" required>
            </div>

            <div class="mb-4">
                <label class="form-label">Job Description</label>
                <textarea class="form-control" name="description" rows="6"
                    placeholder="Describe required skills, experience, and responsibilities..."
                    required></textarea>
            </div>

            <button class="btn btn-success">Create Job</button>

        </form>
    </div>

</div>

</body>
</html>
